name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Debug - Find problematic files
        run: |
          echo "Checking each Python file individually..."
          find . -name "*.py" -type f | while read file; do
            if uv run ruff format --check "$file" >/dev/null 2>&1; then
              echo "✓ $file"
            else
              echo "✗ $file - NEEDS FORMATTING"
            fi
          done

      - name: Check package builds
        run: uv build

      - name: Basic import test
        run: |
          uv run python -c "
          import sys

          class Mock:
              def __getattr__(self, name): return Mock()
              def __call__(self, *args, **kwargs): return Mock()

          sys.modules['torch'] = Mock()
          sys.modules['cartopy'] = type('obj', (), {'config': {}})()

          import IPSL_AID.utils
          import IPSL_AID.logger
          print('✅ Basic imports work')
          "
