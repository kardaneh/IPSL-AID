name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Check package builds
        run: uv build

      - name: Basic import test
        run: |
          uv run python -c "
          import sys
          from types import ModuleType

          class Mock(ModuleType):
            def __getattr__(self, name):
              return self
            def __call__(self, *args, **kwargs):
              return self

          torch = Mock("torch")
          torch.nn = Mock("torch.nn")
          torch.nn.functional = Mock("torch.nn.functional")
          torch.nn.functional.silu = lambda *a, **k: None

          sys.modules["torch"] = torch
          sys.modules["torch.nn"] = torch.nn
          sys.modules["torch.nn.functional"] = torch.nn.functional

          # cartopy minimal mock
          sys.modules["cartopy"] = type("obj", (), {"config": {}})()

          import IPSL_AID.utils
          import IPSL_AID.logger
          import IPSL_AID.networks
          print('✅ Basic imports work')
          "
