name: Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ONLY documentation packages
        run: |
          # Install ONLY what's needed for Sphinx
          pip install sphinx sphinx-rtd-theme myst-parser sphinx-copybutton

          # Create mock modules BEFORE Sphinx runs
          python -c "
          import sys

          # Mock cartopy
          class MockCartopy:
              class config:
                  data_dir = '/tmp/cartopy_data'

              def __getattr__(self, name):
                  return MockCartopy()

          sys.modules['cartopy'] = MockCartopy()

          # Mock other heavy deps
          class MockModule:
              def __init__(self, *args, **kwargs):
                  pass
              def __getattr__(self, name):
                  return MockModule()
              def __call__(self, *args, **kwargs):
                  return MockModule()

          for dep in ['torch', 'xarray', 'netCDF4', 'h5netcdf',
                     'matplotlib', 'scipy', 'numpy', 'pandas']:
              sys.modules[dep] = MockModule()

          print('✅ Mocked all heavy dependencies')
          "

      - name: Build documentation
        run: |
          cd doc
          python -m sphinx.cmd.build -b html source build/html -q
          echo "✅ Documentation built successfully!"

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: doc/build/html/

  deploy:
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: doc/build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/build/html
          publish_branch: gh-pages
