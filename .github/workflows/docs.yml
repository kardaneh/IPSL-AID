name: Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ONLY documentation packages
        run: |
          # Install ONLY what's needed for Sphinx
          pip install sphinx sphinx-rtd-theme myst-parser sphinx-copybutton

          # Create mock modules BEFORE Sphinx runs
          python -c "
          import sys
          from types import ModuleType

          # Single mock class that handles everything
          class MockModule(ModuleType):
              def __init__(self, name):
                  super().__init__(name)

              def __getattr__(self, name):
                  return MockModule(f'{self.__name__}.{name}')

              def __call__(self, *args, **kwargs):
                  return self

          # Mock all heavy dependencies (including cartopy and seaborn)
          for dep in ['torch', 'xarray', 'netCDF4', 'h5netcdf', 'matplotlib',
                     'scipy', 'numpy', 'pandas', 'seaborn', 'cartopy']:
              sys.modules[dep] = MockModule(dep)

          # Special handling for cartopy.config (common in conf.py)
          if 'cartopy' in sys.modules:
              cartopy = sys.modules['cartopy']
              cartopy.config = {'data_dir': '/tmp/cartopy_data'}

          print('✅ Mocked all heavy dependencies')
          "

      - name: Build documentation
        run: |
          cd doc
          make clean
          make html
          echo "✅ Documentation built successfully!"

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: doc/build/html/

  deploy:
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true  # Clean history for private repo
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
