# .readthedocs.yaml
version: 2

# Build configuration
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Documentation builder
sphinx:
  configuration: doc/source/conf.py  # Your conf.py is here
  fail_on_warning: false

# Python environment with uv
python:
  install:
    - method: uv
      path: .
      extra_requirements:
        - docs
  system_packages: false

# Optional: Build formats
formats:
  - html
  - pdf  # Uncomment if you want PDF
  - epub # Uncomment if you want ePub

# Branch configuration
branches:
  main:
    # Default settings for main branch
  latest:
    # Development/latest version
  stable:
    # Stable releases only

# Submodules (if any)
submodules:
  include: all

# Build settings
build_jobs: 2
